fragment ServiceInstance on ServiceInstance {
  release {
    id
    version
    service {
      identifier
      id
      name
    }
  }
  id

  allowedUsers {
    ...ListUser
  }
  deniedUsers {
    ...ListUser
  }
  allowedGroups {
    ...ListGroup
  }
  deniedGroups {
    ...ListGroup
  }
  mappings {
    ...ListServiceInstanceMapping
  }
  aliases {
    ...ListInstanceAlias
  }
  logo {
    presignedUrl
  }
}

fragment ListServiceInstance on ServiceInstance {
  id
}
