overwrite: true
schema: "http://jhnnsrs-lab/rekuest/graphql"
documents: "graphql/rekuest/**/*.graphql"
generates:
  lib/rekuest/api/fragments.ts:
    plugins:
      - "fragment-matcher"
  lib/rekuest/api/graphql.ts:
    plugins:
      - "typescript"
      - "typescript-operations"
      - "typescript-react-apollo"
    config:
      withHooks: true
      reactApolloVersion: 3
      apolloReactHooksImportFrom: "@/lib/rekuest/funcs"

  lib/rekuest/graphql.schema.json:
    plugins:
      - "introspection"
